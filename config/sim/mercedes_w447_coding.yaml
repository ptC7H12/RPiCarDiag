# Simulated UDS responses for Mercedes W447 development/testing
# Format: UDS request (hex string) → UDS response (hex string)
# Used by sim mode to emulate ECU communication without hardware.

vehicle: "mercedes_vklasse_w447"

# Standard DIDs supported by most Mercedes ECUs
standard_dids:
  "22 F1 00": "62 F1 00 01 23"             # Active diagnostic variant ID
  "22 F1 51": "62 F1 51 30 31 2E 30 35"    # Software version "01.05"
  "22 F1 90": "62 F1 90 57 44 43 35 34 37 36 34 30 31 46 31 32 33 34 35 36"  # VIN: WDC5476401F123456

ecu_responses:
  # --- Kombiinstrument (IC447KIG1) ---
  "Kombiinstrument (IC)":
    # DiagnosticSessionControl → Extended Session
    "10 03": "50 03 00 14 00 C8"
    # SecurityAccess Seed Request (Level 01)
    "27 01": "67 01 A3 B7 C2 D1"
    # Restreichweite — DID 0x0108: Byte 0 = 0x30 (Bit 1 = 0 → deaktiviert)
    "22 01 08": "62 01 08 30 00"
    # VIN
    "22 F1 90": "62 F1 90 57 44 43 35 34 37 36 34 30 31 46 31 32 33 34 35 36"
    # ECU Reset
    "11 01": "51 01"
    # Tester Present
    "3E 00": "7E 00"

  # --- SAM Front (CBC447) ---
  "SAM Front (CBC447)":
    "10 03": "50 03 00 14 00 C8"
    "27 0B": "67 0B E4 F5 12 A8"
    # Tippblinken Longstring — enthält 0x03 = 3 Impulse
    "22 02 00": "62 02 00 01 03 00 01 00 01 0A 01"
    "11 01": "51 01"
    "3E 00": "7E 00"

  # --- Motorsteuergerät (CRD3) ---
  "Motorsteuergerät (CRD3)":
    "10 03": "50 03 00 14 00 C8"
    "27 0B": "67 0B 7C 8D 9E AF"
    "22 F1 90": "62 F1 90 57 44 43 35 34 37 36 34 30 31 46 31 32 33 34 35 36"
    # --- DPF / Abgas DIDs (OM651, verifiziert) ---
    # DPF Füllstand: 0x02BC = 700, 700/7 ≈ 100% (Normalbetrieb ~30-50%)
    "22 04 44": "62 04 44 01 5E"         # 350/7 = 50%
    # DPF Differenzdruck: 0x000A = 10, 10*1.45 = 14.5 mbar
    "22 80 18": "62 80 18 00 0A"
    # Abgasgegendruck: 0x0014 = 20, 20*1.45 = 29 mbar
    "22 80 00": "62 80 00 00 14"
    # AGT vor DPF (Zehntel-Kelvin): 0x1D4F = 7503, (7503-2731)/10 = 477.2°C
    "22 80 20": "62 80 20 1D 4F"
    # AGT vor Kat: 0x1F40 = 8000, (8000-2731)/10 = 526.9°C
    "22 29 61": "62 29 61 1F 40"
    # AGT vor SCR: 0x14F0 = 5360, (5360-2731)/10 = 262.9°C
    "22 29 84": "62 29 84 14 F0"
    # AGT vor Turbo: 0x2134 = 8500, (8500-2731)/10 = 576.9°C
    "22 8E 2C": "62 8E 2C 21 34"
    # Regen-Zähler: 0x002A = 42
    "22 25 29": "62 25 29 00 2A"
    # Ladedruck: 0x03E8 = 1000, 1000*1.45 = 1450 mbar
    "22 80 10": "62 80 10 03 E8"
    # Ladelufttemperatur: 0x0C8A = 3210, (3210-2731)/10 = 47.9°C
    "22 80 30": "62 80 30 0C 8A"
    # Motoröltemperatur: 0x0DEA = 3562, (3562-2731)/10 = 83.1°C
    "22 80 32": "62 80 32 0D EA"
    # Kraftstofftemperatur: 0x0CC6 = 3270, (3270-2731)/10 = 53.9°C
    "22 80 60": "62 80 60 0C C6"
    # Common-Rail-Druck: 0x2710 = 10000, 10000*0.145 = 1450 bar
    "22 80 70": "62 80 70 27 10"
    # Tankfüllstand: 0x0019 = 25, 25*2.65 = 66.25 Liter
    "22 14 14": "62 14 14 00 19"
    # Umgebungstemperatur: 0x0BF5 = 3061, (3061-2731)/10 = 33.0°C
    "22 80 28": "62 80 28 0B F5"
    # Atmosphärendruck: 0x02BC = 700, 700*1.45 = 1015 mbar
    "22 AC 2E": "62 AC 2E 02 BC"
    "11 01": "51 01"
    "3E 00": "7E 00"

  # --- Gateway (HGW447) ---
  "Gateway (HGW)":
    "10 03": "50 03 00 14 00 C8"
    "27 0B": "67 0B 11 22 33 44"
    "11 01": "51 01"
    "3E 00": "7E 00"

  # --- Airbag (ORC166) ---
  "Airbag (ORC)":
    "10 03": "50 03 00 14 00 C8"
    "27 0B": "67 0B 55 66 77 88"
    "11 01": "51 01"
    "3E 00": "7E 00"

# Simulated error responses
error_responses:
  # Security Access: invalid key
  security_invalid_key: "7F 27 35"
  # Security Access: exceeded attempts
  security_exceeded: "7F 27 36"
  # Service not supported
  service_not_supported: "7F 22 11"
  # Conditions not correct (e.g. engine running)
  conditions_not_correct: "7F 2E 22"

# Simulated Mercedes-typical DTCs
dtcs:
  - code: "P0299"
    description: "Ladedruckregelung — Ladedruck zu niedrig"
    status: "stored"
    ecu: "Motorsteuergerät (CRD3)"
  - code: "P2002"
    description: "Partikelfilter — Wirkungsgrad unter Schwellwert"
    status: "active"
    ecu: "Motorsteuergerät (CRD3)"
  - code: "U0100"
    description: "Keine Kommunikation mit Motor-ECU"
    status: "stored"
    ecu: "SAM Front (CBC447)"
  - code: "B1056"
    description: "Kombiinstrument — interner Fehler"
    status: "stored"
    ecu: "Kombiinstrument (IC)"
